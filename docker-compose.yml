services:
  fuseki:
    image: stain/jena-fuseki:5.1.0
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin
    volumes:
      - fuseki-data:/fuseki

  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    environment:
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ots
      FUSEKI_USER: admin
      FUSEKI_PASSWORD: admin
      OTS_BASELINE_DIR: /data/baselines
    volumes:
      - ./data/baselines:/data/baselines:ro
    depends_on:
      - fuseki

volumes:
  fuseki-data:
