services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ots
      POSTGRES_PASSWORD: ots
      POSTGRES_DB: ots
    volumes:
      - postgres-data:/var/lib/postgresql/data

  fuseki:
    image: stain/jena-fuseki:5.1.0
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin
    volumes:
      - fuseki-data:/fuseki

  # Dev OIDC provider (SSO). Realm "ots" is imported from infra/keycloak
  # with demo users alex/alex (consultant) and jordan/jordan (stakeholder).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --http-port 8081
    ports:
      - "8081:8081"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro

  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ots
      FUSEKI_USER: admin
      FUSEKI_PASSWORD: admin
      OTS_BASELINE_DIR: /data/baselines
      OTS_THESAURUS_DIR: /data/thesaurus
      OTS_DATABASE_URL: postgresql+psycopg://ots:ots@postgres:5432/ots
    volumes:
      - ./data/baselines:/data/baselines:ro
      - ./data/thesaurus:/data/thesaurus:ro
    depends_on:
      - fuseki
      - postgres

volumes:
  fuseki-data:
  postgres-data:
