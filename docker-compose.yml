services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ots
      POSTGRES_PASSWORD: ots
      POSTGRES_DB: ots
    volumes:
      - postgres-data:/var/lib/postgresql/data

  fuseki:
    image: stain/jena-fuseki:5.1.0
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin
    volumes:
      - fuseki-data:/fuseki

  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ots
      FUSEKI_USER: admin
      FUSEKI_PASSWORD: admin
      OTS_BASELINE_DIR: /data/baselines
      OTS_THESAURUS_DIR: /data/thesaurus
      OTS_DATABASE_URL: postgresql+psycopg://ots:ots@postgres:5432/ots
    volumes:
      - ./data/baselines:/data/baselines:ro
      - ./data/thesaurus:/data/thesaurus:ro
    depends_on:
      - fuseki
      - postgres

volumes:
  fuseki-data:
  postgres-data:
